<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Ingredient Finder</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg,#ff9a9e,#fad0c4);
      color: #333;
    }
    header {
      text-align: center;
      padding: 2rem 1rem;
      color: #fff;
      background: rgba(0,0,0,0.2);
    }
    header h1 {margin: 0; font-size: 2.5rem;}
    .search-box {
      max-width: 600px;
      margin: 1.5rem auto;
      display: flex;
      background: #fff;
      border-radius: 50px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      outline: none;
      font-size: 1rem;
    }
    .search-box button {
      background: #ff6f61;
      color: #fff;
      border: none;
      padding: 0 1.5rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }
    .search-box button:hover {background: #e85a4f;}
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .card:hover {transform: translateY(-5px);}
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card h2 {
      margin: 0.5rem 1rem;
      font-size: 1.4rem;
    }
    .ingredients {
      padding: 0 1rem 1rem;
      font-size: 0.95rem;
    }
    .ingredients ul {padding-left: 1.2rem; margin: 0;}
  </style>
</head>
<body>
  <header>
    <h1>🍲 Food Ingredient Finder</h1>
    <p>Search any dish and discover its ingredients.</p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for a food (e.g. pizza, curry)" />
    <button onclick="searchFood()">Search</button>
  </div>

  <div id="results" class="results"></div>

  <script>
    async function searchFood() {
      const query = document.getElementById('searchInput').value.trim();
      if(!query) return;
      const container = document.getElementById('results');
      container.innerHTML = "<p style='text-align:center;'>Searching...</p>";

      try {
        const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (!data.meals) {
          container.innerHTML = "<p style='text-align:center;'>No meals found. Try another search.</p>";
          return;
        }

        container.innerHTML = "";
        data.meals.forEach(meal => {
          const ingList = [];
          for (let i=1;i<=20;i++){
            const ing = meal[`strIngredient${i}`];
            const measure = meal[`strMeasure${i}`];
            if(ing && ing.trim()!==""){
              ingList.push(`${ing} - ${measure}`);
            }
          }

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
            <h2>${meal.strMeal}</h2>
            <div class="ingredients">
              <strong>Ingredients:</strong>
              <ul>${ingList.map(i=>`<li>${i}</li>`).join('')}</ul>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = "<p style='text-align:center;color:red;'>Error loading data.</p>";
        console.error(err);
      }
    }
  </script>
</body>
</html>
